name: Run Solved Files

on:
  pull_request:
    paths:
      - '**/solved/*.py'

jobs:
  run-solutions:
    runs-on: ubuntu-latest
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run solutions
        run: |
          git config core.quotePath false
          git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '(^|/)solved/.*\.py$' > changed_files.txt || true

          python3 - << 'EOF'
          import subprocess, pathlib

          files = pathlib.Path('changed_files.txt').read_text(encoding='utf-8').strip().splitlines()
          files = [f for f in files if f]

          lines = ['## 🤖 풀이 실행 결과\n']

          if not files:
              lines.append('변경된 `solved/*.py` 파일이 없습니다.')
          else:
              for f in files:
                  lines.append(f'### `{f}`')
                  try:
                      r = subprocess.run(
                          ['python3', f],
                          capture_output=True,
                          text=True,
                          encoding='utf-8',
                          errors='replace',
                          timeout=10,
                      )
                      status = '✅ 성공' if r.returncode == 0 else '❌ 오류'
                      lines.append(status)
                      out = (r.stdout + r.stderr).strip()
                      if out:
                          lines.append(f'```\n{out[:3000]}\n```')
                  except subprocess.TimeoutExpired:
                      lines.append('⏱️ 시간 초과 (10s 초과)')
                  lines.append('')

          pathlib.Path('result.md').write_text('\n'.join(lines), encoding='utf-8')
          EOF

      - name: Find existing comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: '🤖 풀이 실행 결과'

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: result.md
          edit-mode: replace
