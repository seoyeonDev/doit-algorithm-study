<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문제 모음 — Do it! 알고리즘 스터디</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14; --surface: #151820; --surface2: #1c2030;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --accent: #7bffc0; --accent2: #5bd4f0; --accent3: #f0b45b;
    --text: #e8eaf0; --muted: #7a7f8e;
    --mono: 'Space Mono', monospace; --sans: 'Noto Sans KR', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; }
  .grid-bg {
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(123,255,192,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(123,255,192,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  .glow-orb { position: fixed; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(123,255,192,0.06) 0%, transparent 70%); top: -100px; right: -100px; pointer-events: none; z-index: 0; }
  .glow-orb2 { position: fixed; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(91,212,240,0.05) 0%, transparent 70%); bottom: -50px; left: -50px; pointer-events: none; z-index: 0; }

  .container { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; padding: 48px 24px 100px; }

  .page-tag {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 11px; color: var(--accent3);
    border: 1px solid rgba(240,180,91,0.25); padding: 6px 14px; border-radius: 100px;
    margin-bottom: 24px; animation: fadeUp 0.5s ease both;
  }
  h1 { font-family: var(--mono); font-size: clamp(20px, 4vw, 28px); font-weight: 700; line-height: 1.25; margin-bottom: 8px; animation: fadeUp 0.5s 0.1s ease both; }
  .hl { color: var(--accent3); }
  .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 36px; animation: fadeUp 0.5s 0.15s ease both; }

  /* ── Week list ── */
  .week-list { display: flex; flex-direction: column; gap: 8px; animation: fadeUp 0.5s 0.2s ease both; }

  .week-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; transition: border-color 0.2s;
  }

  .week-header {
    display: grid; grid-template-columns: 56px 1fr auto;
    align-items: center; gap: 12px;
    padding: 14px 18px; cursor: pointer;
    transition: background 0.2s;
  }
  .week-header:hover { border-color: rgba(240,180,91,0.3); background: var(--surface2); }

  .week-num { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .week-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .week-chapter { font-family: var(--mono); font-size: 10px; color: var(--accent3); }

  .week-right { display: flex; align-items: center; gap: 10px; }

  /* ── File item (problem.md row) ── */
  .week-body { display: none; padding: 0 18px 14px; border-top: 1px solid var(--border); }
  .week-card.open .week-body { display: block; }
  .chevron { font-family: var(--mono); font-size: 12px; color: var(--muted); transition: transform 0.2s; flex-shrink: 0; }
  .week-card.open .chevron { transform: rotate(180deg); }

  .file-list { display: flex; flex-direction: column; gap: 6px; padding-top: 12px; }
  .file-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 8px;
    background: var(--bg); border: 1px solid var(--border);
    cursor: pointer; transition: border-color 0.2s, background 0.2s;
  }
  .file-item:hover { border-color: rgba(240,180,91,0.35); background: rgba(240,180,91,0.04); }
  .file-icon { font-family: var(--mono); font-size: 10px; color: var(--accent3); flex-shrink: 0; }
  .file-name { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; }
  .file-ext  { font-family: var(--mono); font-size: 10px; color: var(--muted); }

  .file-sublist { display: flex; flex-direction: column; gap: 4px; padding-top: 4px; margin-left: 28px; }
  .file-item.solved { border-color: rgba(123,255,192,0.12); }
  .file-item.solved .file-icon { color: var(--accent); }
  .file-item.solved:hover { border-color: rgba(123,255,192,0.4); background: rgba(123,255,192,0.04); }

  .pr-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-family: var(--mono); font-size: 9px; font-weight: 700;
    padding: 2px 7px; border-radius: 100px; border: 1px solid;
    text-decoration: none; white-space: nowrap; flex-shrink: 0;
    transition: opacity 0.2s;
  }
  .pr-badge:hover { opacity: 0.7; }
  .pr-open   { color: var(--accent2); border-color: rgba(91,212,240,0.4);  background: rgba(91,212,240,0.08); }
  .pr-merged { color: var(--accent);  border-color: rgba(123,255,192,0.4); background: rgba(123,255,192,0.08); }
  .pr-closed { color: var(--muted);   border-color: rgba(122,127,142,0.3); background: rgba(122,127,142,0.07); }

  .github-link {
    display: flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0;
    color: var(--muted); text-decoration: none;
    border: 1px solid transparent;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }
  .github-link:hover { color: var(--text); border-color: var(--border2); background: var(--surface2); }
  .github-link svg { width: 15px; height: 15px; fill: currentColor; }

  .status-badge { font-family: var(--mono); font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: 100px; border: 1px solid; white-space: nowrap; flex-shrink: 0; }
  .status-done     { color: var(--muted); border-color: rgba(122,127,142,0.3); background: rgba(122,127,142,0.07); }
  .status-current  { color: var(--accent); border-color: rgba(123,255,192,0.4); background: rgba(123,255,192,0.1); }
  .status-upcoming { color: var(--accent2); border-color: rgba(91,212,240,0.25); background: rgba(91,212,240,0.06); }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
    align-items: center; justify-content: center; padding: 24px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 16px; width: 100%; max-width: 680px; max-height: 85vh;
    display: flex; flex-direction: column;
    animation: modalIn 0.2s ease both;
  }
  @keyframes modalIn { from { opacity:0; transform:scale(0.96) translateY(12px); } to { opacity:1; transform:none; } }

  .modal-header {
    display: flex; align-items: center; gap: 12px;
    padding: 18px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .modal-title { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--accent3); flex: 1; }
  .modal-week  { font-family: var(--mono); font-size: 10px; color: var(--muted); }

  .modal-github {
    display: flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 8px;
    color: var(--muted); text-decoration: none; border: 1px solid var(--border);
    transition: color 0.2s, border-color 0.2s;
  }
  .modal-github:hover { color: var(--text); border-color: var(--border2); }
  .modal-github svg { width: 16px; height: 16px; fill: currentColor; }

  .modal-close {
    display: flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 8px;
    color: var(--muted); border: 1px solid var(--border);
    background: none; cursor: pointer; font-size: 16px;
    transition: color 0.2s, border-color 0.2s;
  }
  .modal-close:hover { color: var(--text); border-color: var(--border2); }

  .modal-body { overflow-y: auto; padding: 24px; flex: 1; }
  .modal-loading { font-family: var(--mono); font-size: 12px; color: var(--muted); animation: pulse 1s ease infinite alternate; }
  @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }

  /* ── Markdown ── */
  .md-content { line-height: 1.8; font-size: 14px; color: var(--text); }
  .md-content h1 { font-family: var(--mono); font-size: 20px; color: var(--accent3); margin: 0 0 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .md-content h2 { font-family: var(--mono); font-size: 15px; color: var(--accent3); margin: 24px 0 10px; }
  .md-content h3 { font-size: 14px; font-weight: 700; color: var(--text); margin: 16px 0 8px; }
  .md-content p  { color: var(--muted); margin-bottom: 12px; }
  .md-content strong { color: var(--text); font-weight: 600; }
  .md-content ul, .md-content ol { padding-left: 20px; margin-bottom: 12px; color: var(--muted); }
  .md-content li { margin-bottom: 4px; }
  .md-content code { font-family: var(--mono); font-size: 12px; background: var(--surface2); border: 1px solid var(--border); padding: 1px 6px; border-radius: 4px; color: var(--accent3); }
  .md-content pre { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; overflow-x: auto; margin-bottom: 14px; }
  .md-content pre code { background: none; border: none; padding: 0; color: var(--accent2); }
  .md-content blockquote { border-left: 3px solid var(--accent3); padding: 8px 14px; background: rgba(240,180,91,0.04); border-radius: 0 6px 6px 0; margin-bottom: 12px; color: var(--muted); }
  .md-content hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .md-content a { color: var(--accent2); }
  .md-content table { width: 100%; border-collapse: collapse; margin-bottom: 14px; font-size: 13px; }
  .md-content th { background: var(--surface2); padding: 8px 12px; text-align: left; border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 11px; }
  .md-content td { padding: 8px 12px; border: 1px solid var(--border); color: var(--muted); }

  /* ── PR Comments ── */
  .pr-comment-section { margin-top: 24px; border-top: 1px solid var(--border); padding-top: 16px; }
  .pr-comment-section-title {
    font-family: var(--mono); font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px;
    display: flex; align-items: center; gap: 6px;
  }
  .pr-comment-count {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 100px; padding: 1px 7px;
    font-size: 9px; color: var(--muted);
  }
  .pr-comment {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; margin-bottom: 8px;
  }
  .pr-comment.review-comment { border-left: 2px solid rgba(91,212,240,0.4); }
  .pr-comment-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .pr-comment-avatar { width: 20px; height: 20px; border-radius: 50%; }
  .pr-comment-author { font-family: var(--mono); font-size: 11px; color: var(--accent3); font-weight: 700; }
  .pr-comment-date   { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-left: auto; }
  .pr-comment-diff {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 8px 10px; margin-bottom: 8px;
    white-space: pre; overflow-x: auto; line-height: 1.5;
  }
  .pr-comment-body { font-size: 13px; color: var(--text); line-height: 1.7; }
  .pr-comment-body p { margin-bottom: 6px; color: var(--muted); }
  .pr-comment-body code { font-family: var(--mono); font-size: 11px; background: var(--surface2); border: 1px solid var(--border); padding: 1px 5px; border-radius: 3px; color: var(--accent3); }
  .pr-no-comments { font-family: var(--mono); font-size: 12px; color: var(--muted); text-align: center; padding: 16px 0; }

  .footer { margin-top: 48px; text-align: center; font-family: var(--mono); font-size: 11px; color: var(--muted); }
  @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow-orb"></div>
<div class="glow-orb2"></div>

<div class="container">
  <div class="page-tag">문제 모음</div>
  <h1>주차별 <span class="hl">문제 모음</span></h1>
  <p class="subtitle">주차를 클릭하면 해당 주차 문제를 확인할 수 있어요.</p>
  <div class="week-list" id="weekList"></div>
  <div class="footer">자료구조 &amp; 알고리즘 파이썬 스터디 · 2026</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-week" id="modalWeek"></div>
      </div>
      <a class="modal-github" id="modalGithub" href="#" target="_blank" rel="noopener" title="GitHub에서 보기">
        <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      </a>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-loading" id="modalLoading">불러오는 중...</div>
      <div class="md-content" id="mdContent" style="display:none"></div>
    </div>
  </div>
</div>

<script src="/pages/nav.js"></script>
<script>
  const REPO   = 'seoyeonDev/doit-algorithm-study';
  const BRANCH = 'main';
  const STATUS_LABEL = { done: '완료', current: '진행중', upcoming: '예정' };
  const GITHUB_ICON  = `<svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>`;

  // ── Modal ──
  const overlay      = document.getElementById('modalOverlay');
  const modalTitle   = document.getElementById('modalTitle');
  const modalWeek    = document.getElementById('modalWeek');
  const modalGithub  = document.getElementById('modalGithub');
  const modalClose   = document.getElementById('modalClose');
  const modalLoading = document.getElementById('modalLoading');
  const mdContent    = document.getElementById('mdContent');

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function renderComments(comments) {
    if (!comments.length) return `<div class="pr-no-comments">아직 댓글이 없어요.</div>`;
    return comments.map(c => {
      const isReview = !!c.diff_hunk;
      const diffHtml = isReview
        ? `<div class="pr-comment-diff">${c.diff_hunk.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`
        : '';
      const body = marked.parse(c.body || '');
      return `
        <div class="pr-comment${isReview ? ' review-comment' : ''}">
          <div class="pr-comment-meta">
            <img class="pr-comment-avatar" src="${c.user.avatar_url}&s=40" alt="${c.user.login}">
            <span class="pr-comment-author">${c.user.login}</span>
            <span class="pr-comment-date">${formatDate(c.created_at)}</span>
          </div>
          ${diffHtml}
          <div class="pr-comment-body">${body}</div>
        </div>`;
    }).join('');
  }

  function openModal({ rawUrl, githubUrl, title, weekLabel, isCode = false, pr = null }) {
    modalTitle.textContent     = title;
    modalWeek.textContent      = weekLabel;
    modalGithub.href           = githubUrl;
    modalLoading.style.display = 'block';
    mdContent.style.display    = 'none';
    mdContent.innerHTML        = '';
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';

    const codePromise = fetch(rawUrl).then(r => r.text());
    const commentsPromise = pr
      ? Promise.all([
          fetch(`https://api.github.com/repos/${REPO}/issues/${pr.number}/comments`).then(r => r.ok ? r.json() : []),
          fetch(`https://api.github.com/repos/${REPO}/pulls/${pr.number}/comments`).then(r => r.ok ? r.json() : []),
        ]).then(([issue, review]) =>
          [...issue, ...review].sort((a, b) => new Date(a.created_at) - new Date(b.created_at))
        ).catch(() => [])
      : Promise.resolve(null);

    Promise.all([codePromise, commentsPromise])
      .then(([raw, comments]) => {
        if (isCode) {
          const escaped = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          mdContent.innerHTML = `<pre><code>${escaped}</code></pre>`;
        } else {
          mdContent.innerHTML = marked.parse(raw);
        }
        if (comments !== null) {
          mdContent.innerHTML += `
            <div class="pr-comment-section">
              <div class="pr-comment-section-title">
                PR 댓글 <span class="pr-comment-count">${comments.length}</span>
              </div>
              ${renderComments(comments)}
            </div>`;
        }
        modalLoading.style.display = 'none';
        mdContent.style.display    = 'block';
      })
      .catch(() => { modalLoading.textContent = '파일을 불러올 수 없어요.'; });
  }

  function closeModal() {
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  modalClose.addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ── Status ──
  function computeStatus(weeks, year) {
    const today = new Date(); today.setHours(0,0,0,0);
    const thursdays = weeks.map(w => {
      const [mm, dd] = w.date.split('/');
      return new Date(year, parseInt(mm)-1, parseInt(dd));
    });
    let ci = -1;
    for (let i = 0; i < thursdays.length; i++) {
      const start = i === 0 ? new Date(0) : new Date(thursdays[i-1].getTime() + 86400000);
      if (today >= start && today <= thursdays[i]) { ci = i; break; }
    }
    if (ci === -1) return weeks.map(w => ({ ...w, status: 'done' }));
    return weeks.map((w, i) => ({ ...w, status: i < ci ? 'done' : i === ci ? 'current' : 'upcoming' }));
  }

  function weekFolder(num) {
    return `week${String(parseInt(num.replace('W',''))).padStart(2,'0')}`;
  }

  const PR_ICON = `<svg viewBox="0 0 16 16" width="10" height="10" fill="currentColor"><path d="M7.177 3.073L9.573.677A.25.25 0 0110 .854v4.792a.25.25 0 01-.427.177L7.177 3.427a.25.25 0 010-.354zM3.75 2.5a.75.75 0 100 1.5.75.75 0 000-1.5zm-2.25.75a2.25 2.25 0 113 2.122v5.256a2.251 2.251 0 11-1.5 0V5.372A2.25 2.25 0 011.5 3.25zM11 2.5h-1V4h1a1 1 0 011 1v5.628a2.251 2.251 0 101.5 0V5A2.5 2.5 0 0011 2.5zm1 10.25a.75.75 0 111.5 0 .75.75 0 01-1.5 0zM3.75 12a.75.75 0 100 1.5.75.75 0 000-1.5z"/></svg>`;

  // ── PR Map (file path → PR info) ──
  async function buildPRMap() {
    const CACHE_KEY = `pr_map_${REPO}`;
    const cached = sessionStorage.getItem(CACHE_KEY);
    if (cached) return JSON.parse(cached);

    const prs = await fetch(`https://api.github.com/repos/${REPO}/pulls?state=all&per_page=100`)
      .then(r => r.ok ? r.json() : []).catch(() => []);

    const map = {};
    await Promise.all(prs.map(pr =>
      fetch(`https://api.github.com/repos/${REPO}/pulls/${pr.number}/files?per_page=100`)
        .then(r => r.ok ? r.json() : [])
        .then(files => {
          const state = pr.merged_at ? 'merged' : pr.state;
          files.forEach(f => {
            map[f.filename] = { number: pr.number, url: pr.html_url, state };
          });
        })
        .catch(() => {})
    ));

    sessionStorage.setItem(CACHE_KEY, JSON.stringify(map));
    return map;
  }

  // ── Render ──
  Promise.all([
    fetch('/pages/weeks.json').then(r => r.json()),
    buildPRMap(),
  ]).then(([{ weeks, year }, prMap]) => {
      const computed = computeStatus(weeks, year);
      const list = document.getElementById('weekList');

      computed.filter(w => w.num !== 'W00').forEach(w => {
        const folder    = weekFolder(w.num);
        const githubUrl = `https://github.com/${REPO}/blob/${BRANCH}/${folder}/problem/problem.md`;
        const rawUrl    = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${folder}/problem/problem.md`;

        const card = document.createElement('div');
        card.className = 'week-card';
        card.innerHTML = `
          <div class="week-header">
            <div class="week-num">${w.num}</div>
            <div>
              <div class="week-title">${w.title}</div>
              <div class="week-chapter">${w.chapter}</div>
            </div>
            <div class="week-right">
              <span class="status-badge status-${w.status}">${STATUS_LABEL[w.status]}</span>
              <span class="chevron">▾</span>
            </div>
          </div>
          <div class="week-body">
            <div class="file-list">
              <div class="file-item" data-raw="${rawUrl}" data-github="${githubUrl}" data-week="${w.num} · ${w.title}">
                <span class="file-icon">MD</span>
                <span class="file-name">problem</span>
                <span class="file-ext">.md</span>
                <a class="github-link" href="${githubUrl}" target="_blank" rel="noopener" title="GitHub에서 보기">${GITHUB_ICON}</a>
              </div>
            </div>
          </div>
        `;

        const header = card.querySelector('.week-header');
        header.addEventListener('click', () => card.classList.toggle('open'));

        const fileItem = card.querySelector('.file-item');
        fileItem.addEventListener('click', e => {
          if (e.target.closest('.github-link')) return;
          openModal({
            rawUrl:    fileItem.dataset.raw,
            githubUrl: fileItem.dataset.github,
            title:     'problem.md',
            weekLabel: fileItem.dataset.week,
          });
        });

        list.appendChild(card);

        // solved/*.py 파일 목록 가져오기
        fetch(`https://api.github.com/repos/${REPO}/contents/${folder}/solved?ref=${BRANCH}`)
          .then(r => r.ok ? r.json() : [])
          .then(files => {
            const pyFiles = files.filter(f => f.type === 'file' && f.name.endsWith('.py') && f.name !== 'template.py');
            if (!pyFiles.length) return;
            const fileList = card.querySelector('.file-list');
            const subList  = document.createElement('div');
            subList.className = 'file-sublist';
            pyFiles.forEach(f => {
              const name  = f.name.replace('.py', '');
              const pr    = prMap[`${folder}/solved/${f.name}`];
              const prTag = pr
                ? `<a class="pr-badge pr-${pr.state}" href="${pr.url}" target="_blank" rel="noopener">${PR_ICON} #${pr.number}</a>`
                : '';
              const item = document.createElement('div');
              item.className = 'file-item solved';
              item.innerHTML = `
                <span class="file-icon">PY</span>
                <span class="file-name">${name}</span>
                <span class="file-ext">.py</span>
                ${prTag}
                <a class="github-link" href="${f.html_url}" target="_blank" rel="noopener" title="GitHub에서 보기">${GITHUB_ICON}</a>
              `;
              item.addEventListener('click', e => {
                if (e.target.closest('.github-link') || e.target.closest('.pr-badge')) return;
                openModal({
                  rawUrl:    f.download_url,
                  githubUrl: f.html_url,
                  title:     f.name,
                  weekLabel: `${w.num} · ${w.title}`,
                  isCode:    true,
                  pr:        pr || null,
                });
              });
              subList.appendChild(item);
            });
            fileList.appendChild(subList);
          })
          .catch(() => {});
      });
    });
</script>
</body>
</html>
