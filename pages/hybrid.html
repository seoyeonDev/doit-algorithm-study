<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D · Repository Browser — Do it! 알고리즘</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  @font-face {
    font-family: 'JoseonGulim';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@1.0/ChosunGu.woff') format('woff');
    font-weight: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Pretendard Variable';
    font-weight: 45 920;
    font-style: normal;
    font-display: swap;
    src: url('./web/variable/woff2/PretendardVariable.woff2') format('woff2-variations');
  }
  html { font-family: 'JoseonGulim', 'Pretendard Variable', sans-serif; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14; --surface: #151820; --surface2: #1c2030;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --accent: #7bffc0; --accent2: #5bd4f0; --accent3: #f0b45b;
    --text: #e8eaf0; --muted: #7a7f8e;
    --mono: 'Space Mono', monospace; --sans: 'Pretendard Variable', sans-serif;
    --nav-h: 52px;
  }

  body {
    background: var(--bg); color: var(--text);
    font-family: var(--sans);
    overflow: hidden;
  }

  .grid-bg {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(123,255,192,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(123,255,192,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }

  /* ── Layout ── */
  .layout {
    position: fixed;
    top: var(--nav-h); left: 0; right: 0; bottom: 0;
    z-index: 1;
    display: grid;
    grid-template-columns: 220px 1fr;
  }

  /* ── Tree Panel ── */
  .tree-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0 24px;
  }
  .tree-panel::-webkit-scrollbar { width: 3px; }
  .tree-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .tree-label {
    font-family: var(--mono); font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.12em;
    padding: 0 16px 10px;
  }

  .tree-week { cursor: pointer; }

  .tree-week-row {
    display: flex; align-items: center; gap: 7px;
    padding: 7px 16px;
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    user-select: none;
    transition: background 0.15s, color 0.15s;
  }
  .tree-week-row:hover { background: var(--surface2); color: var(--text); }
  .tree-week-row.active { color: var(--accent); }
  .tree-week-row .tw-num { flex-shrink: 0; width: 32px; }
  .tree-week-row .tw-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; opacity: 0.75; }
  .tree-week-row .tw-chev { flex-shrink: 0; font-size: 9px; transition: transform 0.15s; opacity: 0.5; }
  .tree-week.open .tw-chev { transform: rotate(90deg); }

  .tree-subrows { display: none; }
  .tree-week.open .tree-subrows { display: block; }

  .tree-sub-row {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 16px 5px 38px;
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    text-decoration: none;
    transition: background 0.15s, color 0.15s;
  }
  .tree-sub-row:hover { background: var(--surface2); color: var(--text); }
  .tree-sub-row.active { color: var(--accent2); background: rgba(91,212,240,0.06); }
  .tree-sub-row .sub-icon { opacity: 0.5; }

  /* ── Content Panel ── */
  .content-panel {
    overflow-y: auto;
    padding: 28px 36px 60px;
    background: var(--bg);
  }
  .content-panel::-webkit-scrollbar { width: 5px; }
  .content-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── Breadcrumb ── */
  .breadcrumb {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    margin-bottom: 22px;
  }
  .breadcrumb a { color: var(--muted); text-decoration: none; transition: color 0.15s; }
  .breadcrumb a:hover { color: var(--text); }
  .breadcrumb .bc-sep { opacity: 0.4; }
  .breadcrumb .bc-cur { color: var(--text); }

  /* ── Home ── */
  .home-tag {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 11px; color: var(--accent);
    border: 1px solid rgba(123,255,192,0.25);
    padding: 5px 14px; border-radius: 100px; margin-bottom: 16px;
  }
  .home-tag::before {
    content: ''; width: 6px; height: 6px;
    background: var(--accent); border-radius: 50%;
    animation: blink 1.4s ease infinite;
  }
  .home-title {
    font-family: var(--mono); font-size: clamp(20px, 2.5vw, 28px);
    font-weight: 700; line-height: 1.3; margin-bottom: 6px;
  }
  .home-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .hl1 { color: var(--accent); }
  .hl2 { color: var(--accent2); }

  /* ── Strip rows (home week list) ── */
  .week-strip { display: flex; flex-direction: column; gap: 5px; }
  .strip-row {
    display: grid;
    grid-template-columns: 50px 1fr 96px 76px;
    align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 13px 18px;
    text-decoration: none; color: inherit;
    transition: border-color 0.2s, background 0.2s;
  }
  .strip-row:hover { border-color: var(--border2); background: var(--surface2); }
  .strip-row.current { border-color: rgba(123,255,192,0.3); }
  .sr-num { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .sr-body .sr-title { font-size: 14px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 2px; }
  .sr-body .sr-chap { font-family: var(--mono); font-size: 11px; color: var(--accent2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sr-date { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .sr-badge { display: flex; justify-content: flex-end; }

  /* ── Status Badge ── */
  .badge {
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    padding: 3px 10px; border-radius: 100px; border: 1px solid; white-space: nowrap;
  }
  .badge-done     { color: var(--muted);   border-color: rgba(122,127,142,0.3); background: rgba(122,127,142,0.07); }
  .badge-current  { color: var(--accent);  border-color: rgba(123,255,192,0.4); background: rgba(123,255,192,0.1); }
  .badge-upcoming { color: var(--accent2); border-color: rgba(91,212,240,0.25); background: rgba(91,212,240,0.06); }

  /* ── Week View (folder cards) ── */
  .view-title {
    font-family: var(--mono); font-size: 18px; font-weight: 700;
    margin-bottom: 4px;
  }
  .view-sub { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }

  .folder-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .folder-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px 22px;
    display: flex; flex-direction: column; gap: 8px;
    text-decoration: none; color: inherit;
    transition: border-color 0.2s, background 0.2s;
  }
  .folder-card:hover { border-color: var(--border2); background: var(--surface2); }
  .folder-chip {
    display: inline-flex; align-self: flex-start;
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    padding: 3px 8px; border-radius: 4px; border: 1px solid;
  }
  .folder-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .folder-desc { font-size: 13px; color: var(--muted); }

  /* ── Folder View (file list) ── */
  .file-list { display: flex; flex-direction: column; gap: 5px; }
  .file-row {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 18px; border-radius: 8px;
    background: var(--surface); border: 1px solid var(--border);
    text-decoration: none; color: inherit;
    transition: border-color 0.2s, background 0.2s;
  }
  .file-row:hover { border-color: rgba(123,255,192,0.3); background: rgba(123,255,192,0.04); }
  .fr-icon { font-family: var(--mono); font-size: 11px; flex-shrink: 0; width: 28px; }
  .fr-name { font-size: 14px; font-weight: 500; color: var(--text); flex: 1; }
  .fr-ext  { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .fr-gh {
    display: flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 6px; flex-shrink: 0;
    color: var(--muted); text-decoration: none;
    border: 1px solid transparent;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }
  .fr-gh:hover { color: var(--text); border-color: var(--border2); background: var(--surface2); }
  .fr-gh svg { width: 14px; height: 14px; fill: currentColor; }

  /* ── Reader View ── */
  .reader-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 12px; margin-bottom: 24px;
  }
  .reader-title { font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--accent); }
  .reader-meta  { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 4px; }
  .reader-gh {
    display: flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
    color: var(--muted); text-decoration: none; border: 1px solid var(--border);
    transition: color 0.2s, border-color 0.2s;
  }
  .reader-gh:hover { color: var(--text); border-color: var(--border2); }
  .reader-gh svg { width: 16px; height: 16px; fill: currentColor; }

  /* ── Markdown ── */
  .md-content { line-height: 1.8; font-size: 14px; color: var(--text); }
  .md-content h1 { font-family: var(--mono); font-size: 20px; color: var(--accent); margin: 0 0 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .md-content h2 { font-family: var(--mono); font-size: 15px; color: var(--accent2); margin: 24px 0 10px; }
  .md-content h3 { font-size: 14px; font-weight: 700; color: var(--text); margin: 16px 0 8px; }
  .md-content p  { color: var(--muted); margin-bottom: 12px; }
  .md-content strong { color: var(--text); font-weight: 600; }
  .md-content ul, .md-content ol { padding-left: 20px; margin-bottom: 12px; color: var(--muted); }
  .md-content li { margin-bottom: 4px; }
  .md-content code { font-family: var(--mono); font-size: 12px; background: var(--surface2); border: 1px solid var(--border); padding: 1px 6px; border-radius: 4px; color: var(--accent3); }
  .md-content pre { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; overflow-x: auto; margin-bottom: 14px; }
  .md-content pre code { background: none; border: none; padding: 0; color: var(--accent2); font-size: 13px; }
  .md-content blockquote { border-left: 3px solid var(--accent); padding: 8px 14px; background: rgba(123,255,192,0.04); border-radius: 0 6px 6px 0; margin-bottom: 12px; color: var(--muted); }
  .md-content hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .md-content a { color: var(--accent2); }
  .md-content table { width: 100%; border-collapse: collapse; margin-bottom: 14px; font-size: 13px; }
  .md-content th { background: var(--surface2); padding: 8px 12px; text-align: left; border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 11px; }
  .md-content td { padding: 8px 12px; border: 1px solid var(--border); color: var(--muted); }

  /* ── Utility ── */
  .loading { font-family: var(--mono); font-size: 12px; color: var(--muted); padding: 32px 0; animation: pulse 1s ease infinite alternate; }
  .empty   { font-family: var(--mono); font-size: 12px; color: var(--muted); padding: 32px 0; }
  .fade-in { animation: fadeIn 0.25s ease both; }

  @keyframes blink   { 0%,100%{opacity:1} 50%{opacity:.2} }
  @keyframes pulse   { from{opacity:.4} to{opacity:1} }
  @keyframes fadeIn  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="layout">
  <aside class="tree-panel" id="treePanel"></aside>
  <main class="content-panel" id="contentPanel">
    <div class="loading">불러오는 중...</div>
  </main>
</div>

<script src="/pages/nav.js"></script>
<script>
const REPO   = 'seoyeonDev/doit-algorithm-study';
const BRANCH = 'main';
const GH_BASE = `https://github.com/${REPO}`;
const GH_RAW  = `https://raw.githubusercontent.com/${REPO}/${BRANCH}`;
const GH_ICON = `<svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>`;

const FOLDERS = {
  problem:  { chip: 'MD', color: 'var(--accent3)', desc: '주차 문제 파일' },
  summary:  { chip: 'MD', color: 'var(--accent2)', desc: '스터디원 요약 노트' },
  practice: { chip: 'PY', color: 'var(--accent)',  desc: '연습 코드' },
  solved:   { chip: 'PY', color: 'var(--accent)',  desc: '제출 풀이 코드' },
};
const STATUS_LABEL = { done: '완료', current: '진행중', upcoming: '예정' };

function ghApi(p) { return `/api/github?path=${encodeURIComponent(p)}`; }
function weekDir(n) { return `week${String(parseInt(n)).padStart(2,'0')}`; }

// ── Hash parser ──
function parseHash(h) {
  if (!h || h === 'home') return { view: 'home' };
  const p = h.split(':');
  if (p[0] === 'week')   return { view: 'week',   num: +p[1] };
  if (p[0] === 'folder') return { view: 'folder', num: +p[1], folder: p[2] };
  if (p[0] === 'file')   return { view: 'file',   num: +p[1], folder: p[2], file: p.slice(3).join(':') };
  return { view: 'home' };
}

// ── Weeks cache ──
let _weeks = null;
async function getWeeks() {
  if (_weeks) return _weeks;
  _weeks = await fetch('/pages/weeks.json').then(r => r.json());
  return _weeks;
}

function computeStatus(weeks, year) {
  const today = new Date(); today.setHours(0,0,0,0);
  const thu = weeks.map(w => { const [m,d] = w.date.split('/'); return new Date(year, +m-1, +d); });
  let ci = -1;
  for (let i = 0; i < thu.length; i++) {
    const start = i === 0 ? new Date(0) : new Date(thu[i-1].getTime() + 86400000);
    if (today >= start && today <= thu[i]) { ci = i; break; }
  }
  if (ci < 0) return weeks.map(w => ({ ...w, status: 'done' }));
  return weeks.map((w,i) => ({ ...w, status: i < ci ? 'done' : i === ci ? 'current' : 'upcoming' }));
}

function weekNum(w) { return parseInt(w.num.replace('W','')); }

// ── Breadcrumb ──
function bc(items) {
  return `<div class="breadcrumb">${items.map((it,i) =>
    i < items.length-1
      ? `<a href="${it.href}">${it.label}</a><span class="bc-sep">/</span>`
      : `<span class="bc-cur">${it.label}</span>`
  ).join('')}</div>`;
}

// ── Tree ──
async function renderTree(state) {
  const panel = document.getElementById('treePanel');
  const { weeks } = await getWeeks();

  panel.innerHTML = `<div class="tree-label">주차 목록</div>`;

  weeks.forEach(w => {
    const n = weekNum(w);
    const isOpen = n === state.num;
    const weekActive = state.view === 'week' && isOpen;

    const el = document.createElement('div');
    el.className = `tree-week${isOpen ? ' open' : ''}`;

    el.innerHTML = `
      <div class="tree-week-row${weekActive ? ' active' : ''}">
        <span class="tw-num">${w.num}</span>
        <span class="tw-title">${w.title.replace(/🎉\s*/,'')}</span>
        <span class="tw-chev">▶</span>
      </div>
      <div class="tree-subrows">
        ${Object.keys(FOLDERS).map(f => `
          <a class="tree-sub-row${state.view !== 'home' && isOpen && f === state.folder ? ' active' : ''}"
             href="#folder:${n}:${f}">
            <span class="sub-icon">📁</span><span>${f}/</span>
          </a>`).join('')}
      </div>`;

    el.querySelector('.tree-week-row').addEventListener('click', () => {
      location.hash = `week:${n}`;
    });

    panel.appendChild(el);
  });
}

// ── Content ──
const content = document.getElementById('contentPanel');

async function renderContent(state) {
  const { weeks, year } = await getWeeks();
  const computed = computeStatus(weeks, year);

  if (state.view === 'home') {
    renderHome(computed);
  } else {
    const w = computed.find(x => weekNum(x) === state.num);
    if (!w) { content.innerHTML = `<div class="empty">주차를 찾을 수 없어요.</div>`; return; }
    if (state.view === 'week')   renderWeek(state.num, w);
    if (state.view === 'folder') renderFolder(state.num, state.folder, w);
    if (state.view === 'file')   renderFile(state.num, state.folder, state.file, w);
  }
}

function renderHome(computed) {
  content.innerHTML = `
    <div class="fade-in">
      <div class="home-tag">알고리즘 스터디</div>
      <h1 class="home-title"><span class="hl1">Do it!</span> 자료구조와 함께<br>배우는 <span class="hl2">알고리즘</span> 입문</h1>
      <p class="home-sub">파이썬 편 · 2025.04.13 ~ 07.31 · 매주 목요일 20:00</p>
      <div class="week-strip">
        ${computed.map(w => {
          const n = weekNum(w);
          return `
            <a class="strip-row ${w.status}" href="#week:${n}">
              <div class="sr-num">${w.num}</div>
              <div class="sr-body">
                <div class="sr-title">${w.title}</div>
                <div class="sr-chap">${w.chapter}</div>
              </div>
              <div class="sr-date">${w.date}</div>
              <div class="sr-badge">
                <span class="badge badge-${w.status}">${STATUS_LABEL[w.status]}</span>
              </div>
            </a>`;
        }).join('')}
      </div>
    </div>`;
}

function renderWeek(num, w) {
  content.innerHTML = `
    <div class="fade-in">
      ${bc([{label:'home',href:'#home'},{label:`${w.num} · ${w.title}`}])}
      <div class="view-title">${w.num} — ${w.title}</div>
      <div class="view-sub">
        <span>${w.chapter}</span>
        <span>·</span>
        <span>${w.date}</span>
        <span class="badge badge-${w.status}">${STATUS_LABEL[w.status]}</span>
      </div>
      <div class="folder-grid">
        ${Object.entries(FOLDERS).map(([name, meta]) => `
          <a class="folder-card" href="#folder:${num}:${name}">
            <span class="folder-chip" style="color:${meta.color};border-color:${meta.color}40">${meta.chip}</span>
            <div class="folder-name">${name}/</div>
            <div class="folder-desc">${meta.desc}</div>
          </a>`).join('')}
      </div>
    </div>`;
}

async function renderFolder(num, folderName, w) {
  content.innerHTML = `<div class="loading">불러오는 중...</div>`;

  const dir = weekDir(num);
  let files = [];
  try {
    const res = await fetch(ghApi(`repos/${REPO}/contents/${dir}/${folderName}?ref=${BRANCH}`));
    if (res.ok) {
      const data = await res.json();
      files = Array.isArray(data) ? data.filter(f => f.type === 'file' && f.name !== '.gitkeep') : [];
    }
  } catch {}

  const meta = FOLDERS[folderName] || { chip:'FILE', color:'var(--muted)' };

  content.innerHTML = `
    <div class="fade-in">
      ${bc([
        {label:'home',href:'#home'},
        {label:w.num,href:`#week:${num}`},
        {label:`${folderName}/`}
      ])}
      <div class="view-title" style="color:var(--accent2)">${folderName}/</div>
      <div class="view-sub"><span style="opacity:.6">${dir}/${folderName}</span></div>
      <div class="file-list">
        ${files.length === 0
          ? '<div class="empty">파일이 없어요.</div>'
          : files.map(f => {
              const ext = f.name.split('.').pop();
              const nameNoExt = f.name.slice(0, -(ext.length+1));
              const isMarkdown = ext === 'md';
              const href = isMarkdown ? `#file:${num}:${folderName}:${f.name}` : f.html_url;
              const target = isMarkdown ? '' : 'target="_blank" rel="noopener"';
              return `
                <a class="file-row" href="${href}" ${target}>
                  <span class="fr-icon" style="color:${meta.color}">${ext.toUpperCase()}</span>
                  <span class="fr-name">${nameNoExt}</span>
                  <span class="fr-ext">.${ext}</span>
                  <a class="fr-gh" href="${f.html_url}" target="_blank" rel="noopener"
                     title="GitHub에서 보기" onclick="event.stopPropagation()">${GH_ICON}</a>
                </a>`;
            }).join('')}
      </div>
    </div>`;
}

async function renderFile(num, folderName, fileName, w) {
  content.innerHTML = `<div class="loading">불러오는 중...</div>`;

  const dir = weekDir(num);
  const rawUrl    = `${GH_RAW}/${dir}/${folderName}/${fileName}`;
  const githubUrl = `${GH_BASE}/blob/${BRANCH}/${dir}/${folderName}/${fileName}`;

  let text = '', err = false;
  try {
    const res = await fetch(rawUrl);
    if (res.ok) text = await res.text(); else err = true;
  } catch { err = true; }

  const ext = fileName.split('.').pop();
  const nameNoExt = fileName.slice(0, -(ext.length+1));
  const isMarkdown = ext === 'md';

  let body;
  if (err) {
    body = `<div class="empty">파일을 불러올 수 없어요.</div>`;
  } else if (isMarkdown) {
    body = `<div class="md-content">${marked.parse(text)}</div>`;
  } else {
    const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    body = `<div class="md-content"><pre><code>${escaped}</code></pre></div>`;
  }

  content.innerHTML = `
    <div class="fade-in">
      ${bc([
        {label:'home',href:'#home'},
        {label:w.num,href:`#week:${num}`},
        {label:`${folderName}/`,href:`#folder:${num}:${folderName}`},
        {label:fileName}
      ])}
      <div class="reader-header">
        <div>
          <div class="reader-title">${nameNoExt}</div>
          <div class="reader-meta">${dir}/${folderName}/${fileName}</div>
        </div>
        <a class="reader-gh" href="${githubUrl}" target="_blank" rel="noopener" title="GitHub에서 보기">${GH_ICON}</a>
      </div>
      ${body}
    </div>`;
}

// ── Router ──
async function route() {
  const state = parseHash(location.hash.slice(1));
  content.innerHTML = `<div class="loading">불러오는 중...</div>`;
  await Promise.all([renderTree(state), renderContent(state)]);
}

window.addEventListener('hashchange', route);
route();
</script>
</body>
